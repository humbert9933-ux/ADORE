<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard | ADÓRE</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .admin-container { max-width: 1000px; margin: 40px auto; padding: 20px; }
      .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
      .controls { display: flex; gap: 10px; }
      .controls select, .controls button { padding: 10px; background: var(--soft-panel); border: 1px solid var(--line); color: var(--text); border-radius: 4px; }
      .controls button { cursor: pointer; background: var(--gold); color: var(--black); font-weight: bold; }
      table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--soft-panel); }
      th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--line); }
      th { color: var(--gold); }
      .status-select { background: transparent; border: 1px solid var(--line); color: var(--text); padding: 5px; }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <div class="admin-header">
        <h1>Gestión de Reservas - ADÓRE</h1>
        <div class="controls">
          <select id="statusFilter">
            <option value="Todos">Todos los estados</option>
            <option value="Pendiente">Pendientes</option>
            <option value="Confirmada">Confirmadas</option>
            <option value="Atendida">Atendidas</option>
            <option value="Cancelada">Canceladas</option>
          </select>
          <button id="seedData">Cargar Datos Prueba</button>
          <button id="clearData" style="background: #a00; color: white;">Borrar Todo</button>
        </div>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Teléfono</th>
            <th>Tratamiento</th>
            <th>Fecha</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="bookingRows">
          </tbody>
      </table>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
